name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Copy app icons
        run: |
          for dir in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi; do
            mkdir -p android/app/src/main/res/$dir
            cp icon-192.png android/app/src/main/res/$dir/ic_launcher.png
          done
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          cp icon-512.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Build Release APK
        working-directory: android
        run: gradle assembleRelease

      - name: Find APK
        run: find android -name "*.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: notes-app-release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "פתקי משימות v1.0.${{ github.run_number }}"
          body: |
            ## APK לאנדרואיד - פתקי משימות

            **להתקנה:**
            1. הורד את הקובץ `app-release-unsigned.apk`
            2. העבר לטלפון
            3. אפשר התקנה ממקורות לא ידועים בהגדרות
            4. פתח את הקובץ והתקן
          files: android/app/build/outputs/apk/release/app-release-unsigned.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
