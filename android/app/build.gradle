plugins {
    id 'com.android.application'
}

android {
    namespace 'com.aquaadir141.notesapp'
    compileSdk 34

    defaultConfig {
        applicationId "com.aquaadir141.notesapp"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
        debug {
            applicationIdSuffix ""
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {
}
